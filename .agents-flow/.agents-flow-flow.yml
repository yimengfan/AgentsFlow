agentsflow: true
meta:
  schemaVersion: "1.0"
  name: .agents-flow-flow
  description: 默认流程：主Agent生成计划 → 子Agent执行 → 主Agent评分 → 结束
  version: 0.1.0
  tags:
    - starter
agents:
  agentDefs:
    - agentId: main-agent
      adapterKind: pi-mono
      modelProfile:
        model: deepseek-v4-flash
        systemPrompt: You are a planning and evaluation agent.
      toolPolicy:
        allowedCapabilities: []
        blockedTools: []
        approvalRequirement: destructive_only
      memoryPolicy:
        visibleScopes:
          - run
        writableScopes:
          - run
      subagentPolicy:
        allowedAgents:
          - sub-agent
        switchModes:
          - flow-forced
        returnStrategy: summary-only
      timeouts:
        turnMs: 60000
        sessionMs: 300000
      budgets:
        maxSteps: 10
      adapterConfig:
        transport: deepseek
    - agentId: sub-agent
      adapterKind: pi-mono
      modelProfile:
        model: deepseek-v4-flash
        systemPrompt: You are an execution agent. Carry out the plan.
      toolPolicy:
        allowedCapabilities: []
        blockedTools: []
        approvalRequirement: destructive_only
      memoryPolicy:
        visibleScopes:
          - run
        writableScopes:
          - run
          - node
      subagentPolicy:
        allowedAgents: []
        switchModes: []
        returnStrategy: summary-only
      timeouts:
        turnMs: 60000
        sessionMs: 300000
      budgets:
        maxSteps: 20
      adapterConfig:
        transport: deepseek
graph:
  nodes:
    - nodeId: loader-workdir
      nodeKind: loader.work-dir
      label: 加载工作目录
      config: {}
      inputPorts:
        - portId: in
          dataType: flow
          required: true
      outputPorts:
        - portId: out
          dataType: flow
          required: true
        - portId: data
          dataType: documents
          required: true
      params: []
      category: Loader/WorkDir
    - nodeId: main-prompt
      nodeKind: agent.main
      label: 主 Agent
      agentRef: talos-code-plan
      config:
        turnMode: plan
        userPrompt: 请根据用户输入生成一个简洁可执行的计划，输出重点步骤。
        model: deepseek.com/deepseek-v4-pro
      inputPorts:
        - portId: in
          dataType: flow
          required: true
        - portId: prompt
          dataType: prompt
          required: true
        - portId: data
          dataType: any
          required: true
      outputPorts:
        - portId: out
          dataType: flow
          required: true
        - portId: result
          dataType: string
          required: true
        - portId: plan
          dataType: plan
          required: true
      params: []
      category: Agent/Main
      agentMdPath: .agents-flow/agents/Talos-Code-Plan.agent.md
    - nodeId: sub-execute
      nodeKind: agent.sub
      label: 子 Agent
      agentRef: talos-code-execute
      config:
        turnMode: normal
        systemPrompt: 按照计划步骤执行任务。
        model: deepseek.com/deepseek-v4-flash
      inputPorts:
        - portId: in
          dataType: flow
          required: true
        - portId: prompt
          dataType: prompt
          required: true
        - portId: data
          dataType: any
          required: true
      outputPorts:
        - portId: out
          dataType: flow
          required: true
        - portId: result
          dataType: string
          required: true
      params: []
      category: Agent/Sub
      agentMdPath: .agents-flow/agents/talos-code-execute.agent.md
    - nodeId: main-evaluate
      nodeKind: agent.main
      label: 主 Agent
      agentRef: talos-code-plan
      config:
        turnMode: evaluate
        evaluatePrompt: '评估执行结果，给出 0-1 评分。返回 JSON： {"score": <number>, "canComplete": <boolean>, "reason": "<string>"}'
        model: deepseek.com/deepseek-v4-flash
      inputPorts:
        - portId: in
          dataType: flow
          required: true
        - portId: data
          dataType: any
          required: true
      outputPorts:
        - portId: out
          dataType: flow
          required: true
        - portId: result
          dataType: string
          required: true
        - portId: score
          dataType: score
          required: true
      params: []
      category: Agent/Main
      agentMdPath: .agents-flow/agents/Talos-Code-Plan.agent.md
    - nodeId: finish
      nodeKind: control.finish
      label: 结束
      config: {}
      inputPorts:
        - portId: in
          dataType: flow
          required: true
        - portId: result
          dataType: any
          required: true
      outputPorts: []
      params: []
      category: Control/Finish
  edges:
    - source: loader-workdir
      target: main-prompt
      sourceHandle: out
      targetHandle: in
      dataEdge: false
    - source: loader-workdir
      target: main-prompt
      sourceHandle: data
      targetHandle: data
      dataEdge: true
    - source: main-prompt
      target: sub-execute
      sourceHandle: out
      targetHandle: in
      dataEdge: false
    - source: main-prompt
      target: sub-execute
      sourceHandle: result
      targetHandle: prompt
      dataEdge: true
    - source: sub-execute
      target: main-evaluate
      sourceHandle: result
      targetHandle: data
      dataEdge: true
    - source: sub-execute
      target: main-evaluate
      sourceHandle: out
      targetHandle: in
      dataEdge: false
    - source: main-evaluate
      target: finish
      sourceHandle: result
      targetHandle: result
      dataEdge: true
    - source: main-evaluate
      target: finish
      sourceHandle: out
      targetHandle: in
      dataEdge: false
  startNodeId: loader-workdir
runtime:
  maxConcurrency: 1
  defaultTurnTimeoutMs: 60000
  persistEvents: true
  persistMemorySnapshots: false
layout:
  positions:
    - nodeId: loader-workdir
      x: 50
      y: 200
    - nodeId: main-prompt
      x: 300
      y: 200
    - nodeId: sub-execute
      x: 550
      y: 200
    - nodeId: main-evaluate
      x: 800
      y: 200
    - nodeId: finish
      x: 1050
      y: 200
  nodeBindings:
    - nodeId: main-prompt
      agentId: main-agent
    - nodeId: sub-execute
      agentId: sub-agent
    - nodeId: main-evaluate
      agentId: main-agent
  viewport:
    x: 0
    y: 0
    zoom: 0.8
extensions:
  customNodeSpecs: []
