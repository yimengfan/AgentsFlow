agentsflow: true
meta:
  schemaVersion: '1.0'
  name: apps-flow
  description: 默认流程：加载 → 主Agent提示词 → 计划循环 → 子Agent执行 → 主Agent评分 → 结束
  version: 0.1.0
  tags:
    - starter
agents:
  agentDefs:
    - agentId: main-agent
      adapterKind: fake
      modelProfile:
        systemPrompt: You are a planning and evaluation agent.
      toolPolicy:
        allowedCapabilities: []
        blockedTools: []
        approvalRequirement: destructive_only
      memoryPolicy:
        visibleScopes:
          - run
        writableScopes:
          - run
      subagentPolicy:
        allowedAgents:
          - sub-agent
        switchModes:
          - flow-forced
        returnStrategy: summary-only
      timeouts:
        turnMs: 60000
        sessionMs: 300000
      budgets:
        maxSteps: 10
    - agentId: sub-agent
      adapterKind: fake
      modelProfile:
        systemPrompt: You are an execution agent. Carry out the plan.
      toolPolicy:
        allowedCapabilities: []
        blockedTools: []
        approvalRequirement: destructive_only
      memoryPolicy:
        visibleScopes:
          - run
        writableScopes:
          - run
          - node
      subagentPolicy:
        allowedAgents: []
        switchModes: []
        returnStrategy: summary-only
      timeouts:
        turnMs: 60000
        sessionMs: 300000
      budgets:
        maxSteps: 20
graph:
  nodes:
    - nodeId: loader-workdir
      nodeKind: loader.work-dir
      label: 加载工作目录
      category: Loader/WorkDir
      config: {}
      inputPorts:
        - portId: in
          dataType: flow
          required: true
      outputPorts:
        - portId: out
          dataType: flow
        - portId: data
          dataType: documents
      params: []
    - nodeId: main-prompt
      nodeKind: agent.main
      label: 主Agent - 提示词输入
      category: Agent/Main
      agentId: main-agent
      config:
        turnMode: prompt
        systemPrompt: 分析输入数据，生成任务提示词。
      inputPorts:
        - portId: in
          dataType: flow
        - portId: data
          dataType: any
      outputPorts:
        - portId: out
          dataType: flow
        - portId: result
          dataType: string
        - portId: plan
          dataType: plan
      params: []
    - nodeId: plan-loop
      nodeKind: control.plan-loop
      label: 计划-执行循环
      category: Control/PlanLoop
      config:
        maxIterations: 5
        completionThreshold: 0.8
        evaluatePrompt: 评估执行结果，给出 0-1 的评分。
      inputPorts:
        - portId: in
          dataType: flow
        - portId: prompt
          dataType: prompt
      outputPorts:
        - portId: plan
          dataType: plan
        - portId: execute
          dataType: flow
        - portId: evaluate
          dataType: flow
        - portId: done
          dataType: flow
        - portId: score
          dataType: score
      params:
        - paramId: maxIterations
          paramType: number
          defaultValue: 5
          description: 最大循环次数
        - paramId: completionThreshold
          paramType: number
          defaultValue: 0.8
          description: 完成评分阈值
    - nodeId: sub-execute
      nodeKind: agent.sub
      label: 子Agent - 执行
      category: Agent/Sub
      agentId: sub-agent
      config:
        turnMode: normal
        systemPrompt: 按照计划步骤执行任务。
      inputPorts:
        - portId: in
          dataType: flow
        - portId: prompt
          dataType: prompt
      outputPorts:
        - portId: out
          dataType: flow
        - portId: result
          dataType: string
      params: []
    - nodeId: main-evaluate
      nodeKind: agent.main
      label: 主Agent - 评分
      category: Agent/Main
      agentId: main-agent
      config:
        turnMode: evaluate
        evaluatePrompt: >-
          评估执行结果，给出 0-1 评分。返回 JSON：
          {"score": <number>, "canComplete": <boolean>, "reason": "<string>"}
      inputPorts:
        - portId: in
          dataType: flow
        - portId: data
          dataType: any
      outputPorts:
        - portId: out
          dataType: flow
        - portId: result
          dataType: string
        - portId: score
          dataType: score
      params: []
    - nodeId: finish
      nodeKind: control.finish
      label: 结束
      category: Control/Finish
      config: {}
      inputPorts:
        - portId: in
          dataType: flow
        - portId: result
          dataType: any
      outputPorts: []
      params: []
  edges:
    # 加载 → 主Agent提示词输入
    - source: loader-workdir
      target: main-prompt
      sourceHandle: out
      targetHandle: in
    # 主Agent → 计划循环
    - source: main-prompt
      target: plan-loop
      sourceHandle: out
      targetHandle: in
    # 计划循环 → 执行
    - source: plan-loop
      target: sub-execute
      sourceHandle: execute
      targetHandle: in
    # 执行 → 评分
    - source: sub-execute
      target: main-evaluate
      sourceHandle: result
      targetHandle: data
      dataEdge: true
    - source: sub-execute
      target: main-evaluate
      sourceHandle: out
      targetHandle: in
    # 评分 → 循环回计划（未完成时）
    - source: main-evaluate
      target: plan-loop
      sourceHandle: score
      targetHandle: prompt
      dataEdge: true
    - source: main-evaluate
      target: plan-loop
      sourceHandle: out
      targetHandle: in
    # 循环完成 → 结束
    - source: plan-loop
      target: finish
      sourceHandle: done
      targetHandle: in
    # 加载的数据传入主Agent
    - source: loader-workdir
      target: main-prompt
      sourceHandle: data
      targetHandle: data
      dataEdge: true
  startNodeId: loader-workdir
runtime:
  maxConcurrency: 1
  defaultTurnTimeoutMs: 60000
  persistEvents: true
  persistMemorySnapshots: false
layout:
  positions:
    - nodeId: loader-workdir
      x: 50
      y: 200
    - nodeId: main-prompt
      x: 300
      y: 200
    - nodeId: plan-loop
      x: 550
      y: 200
    - nodeId: sub-execute
      x: 800
      y: 350
    - nodeId: main-evaluate
      x: 800
      y: 50
    - nodeId: finish
      x: 1050
      y: 200
  nodeBindings:
    - nodeId: main-prompt
      agentId: main-agent
    - nodeId: sub-execute
      agentId: sub-agent
    - nodeId: main-evaluate
      agentId: main-agent
  viewport:
    x: 0
    y: 0
    zoom: 0.8
